<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burme Chat - ဗွီမ်ချက်ခ်</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pyidaungsu', 'Padauk', sans-serif;
        }

        :root {
            --primary: #B22222;
            --secondary: #FFD700;
            --background: #F5F5F5;
            --user-bubble: #B22222;
            --ai-bubble: #FFFFFF;
            --text: #333333;
            --text-light: #FFFFFF;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            background: var(--background);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Welcome Screen */
        #welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #B22222 0%, #8B0000 100%);
            position: relative;
            overflow: hidden;
        }

        #welcome-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .welcome-content {
            text-align: center;
            z-index: 1;
            padding: 20px;
        }

        .logo {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .app-title {
            font-size: 42px;
            color: var(--secondary);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .app-subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
        }

        .start-btn {
            background: var(--secondary);
            color: #B22222;
            border: none;
            padding: 18px 50px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        /* Chat Screen */
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: var(--background);
        }

        .chat-header {
            background: linear-gradient(135deg, #B22222 0%, #8B0000 100%);
            color: var(--text-light);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px var(--shadow);
            z-index: 100;
        }

        .chat-header h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            color: var(--text-light);
            border-bottom-right-radius: 5px;
        }

        .message.ai {
            align-self: flex-start;
            background: var(--ai-bubble);
            color: var(--text);
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .message .timestamp {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
            display: block;
        }

        .message.user .timestamp {
            text-align: right;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--ai-bubble);
            padding: 15px 20px;
            border-radius: 18px;
            box-shadow: 0 2px 8px var(--shadow);
            border-bottom-left-radius: 5px;
        }

        .typing-indicator.active {
            display: flex;
            gap: 5px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }

        /* Input Area */
        .input-area {
            padding: 15px 20px;
            background: white;
            display: flex;
            gap: 10px;
            box-shadow: 0 -2px 10px var(--shadow);
        }

        .message-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .message-input:focus {
            border-color: var(--primary);
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s, background 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.1);
            background: #8B0000;
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Settings Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-content h2 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .modal-btn.cancel {
            background: #eee;
            color: var(--text);
        }

        .modal-btn.save {
            background: var(--primary);
            color: white;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
        }

        /* Dark Mode */
        body.dark-mode {
            --background: #1a1a2e;
            --ai-bubble: #2a2a3e;
            --text: #e0e0e0;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body.dark-mode .input-area {
            background: #1a1a2e;
        }

        body.dark-mode .message-input {
            background: #2a2a3e;
            border-color: #3a3a4e;
            color: #e0e0e0;
        }

        body.dark-mode .modal-content {
            background: #2a2a3e;
        }

        body.dark-mode .form-group input {
            background: #1a1a2e;
            border-color: #3a3a4e;
            color: #e0e0e0;
        }

        body.dark-mode .form-group label,
        body.dark-mode .modal-content h2 {
            color: #e0e0e0;
        }

        body.dark-mode .modal-btn.cancel {
            background: #3a3a4e;
            color: #e0e0e0;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        /* Error Message */
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 10px 15px;
            border-radius: 10px;
            text-align: center;
            margin: 10px 20px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .app-title {
                font-size: 32px;
            }

            .logo {
                font-size: 60px;
            }

            .message {
                max-width: 90%;
            }

            .chat-header h1 {
                font-size: 18px;
            }
        }

        /* Auth Screen */
        #auth-screen {
            display: none;
            min-height: 100vh;
            background: linear-gradient(135deg, #B22222 0%, #8B0000 100%);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .auth-logo {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .auth-title {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 25px;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-size: 15px;
            cursor: pointer;
            color: #666;
            transition: all 0.3s;
        }

        .auth-tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            font-weight: bold;
        }

        .auth-form input {
            width: 100%;
            padding: 14px 15px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .auth-form input:focus {
            border-color: var(--primary);
        }

        .auth-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .auth-submit:hover {
            background: #8B0000;
        }

        .auth-error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        /* Dark Mode Auth */
        body.dark-mode .auth-container {
            background: #2a2a3e;
        }

        body.dark-mode .auth-title {
            color: var(--secondary);
        }

        body.dark-mode .auth-tabs {
            border-bottom-color: #3a3a4e;
        }

        body.dark-mode .auth-tab {
            color: #aaa;
        }

        body.dark-mode .auth-tab.active {
            color: var(--secondary);
            border-bottom-color: var(--secondary);
        }

        body.dark-mode .auth-form input {
            background: #1a1a2e;
            border-color: #3a3a4e;
            color: #e0e0e0;
        }

        body.dark-mode .auth-error {
            background: #3a2a2a;
            color: #e57373;
        }
    </style>
</head>
<body>
    <!-- Welcome Screen -->
    <div id="welcome-screen">
        <div class="welcome-content">
            <div class="logo">💬</div>
            <h1 class="app-title">Burme Chat</h1>
            <p class="app-subtitle">မြန်မာစာလို စကားပြောရန် AI ချက်ခ်</p>
            <button class="start-btn" onclick="startChat()">မြန်မာလို စကားပြောမယ်</button>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen">
        <div class="chat-header">
            <h1>💬 Burme Chat</h1>
            <div class="header-actions">
                <button class="header-btn" onclick="toggleTheme()">🌓</button>
                <button class="header-btn" onclick="clearChat()">🗑️</button>
                <button class="header-btn" onclick="openSettings()">⚙️</button>
                <button class="header-btn" onclick="logout()">🚪</button>
            </div>
        </div>

        <div class="chat-container" id="chat-container">
            <div class="empty-state" id="empty-state">
                <div class="empty-state-icon">💬</div>
                <p>မြန်မာလို စာရိုက်ပြောပါရန်...</p>
            </div>
        </div>

        <div class="typing-indicator" id="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>

        <div class="input-area">
            <input type="text" class="message-input" id="message-input" placeholder="စာရိုက်ပါရန်..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <h2>⚙️ အပြင်အဆင်များ</h2>
            <div class="form-group">
                <label for="api-key">Google Gemini API Key</label>
                <input type="password" id="api-key" placeholder="AIzaSy...">
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="dark-mode-toggle" onchange="toggleTheme()"> အနက်ရော်မုဒ်
                </label>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeSettings()">မလုပ်ပါန်း</button>
                <button class="modal-btn save" onclick="saveSettings()">သိမ်းမယ်</button>
            </div>
        </div>
    </div>

    <!-- Auth Screen -->
    <div id="auth-screen" style="display:none;">
        <div class="auth-container">
            <div class="auth-logo">💬</div>
            <h1 class="auth-title">Burme Chat</h1>
            
            <div class="auth-tabs">
                <button class="auth-tab active" data-form="login">ဝင်မယ်</button>
                <button class="auth-tab" data-form="register">မှတ်ပုံတင်</button>
                <button class="auth-tab" data-form="reset">စကားဝှက်မေ့တယ်</button>
            </div>

            <div class="auth-error" id="auth-error" style="display:none;"></div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <input type="email" id="login-email" placeholder="အီးမေးလ်" required>
                <input type="password" id="login-password" placeholder="စကားဝှက်" required>
                <button type="submit" class="auth-submit">ဝင်မယ်</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form" style="display:none;">
                <input type="email" id="register-email" placeholder="အီးမေးလ်" required>
                <input type="password" id="register-password" placeholder="စကားဝှက် (အနည်းဆုံး ၆ လုံး)" minlength="6" required>
                <button type="submit" class="auth-submit">မှတ်ပုံတင်မယ်</button>
            </form>

            <!-- Reset Form -->
            <form id="reset-form" class="auth-form" style="display:none;">
                <input type="email" id="reset-email" placeholder="အီးမေးလ်" required>
                <button type="submit" class="auth-submit">ပါဆယ်လိုက်ပါရန်</button>
            </form>
        </div>
    </div>

    <script type="module">
      // Firebase Configuration
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyA5BS_7xfD1-VhGYlBfkKLBkHUKnkZXBsg",
        authDomain: "amkyawdev.firebaseapp.com",
        projectId: "amkyawdev",
        storageBucket: "amkyawdev.firebasestorage.app",
        messagingSenderId: "242883286611",
        appId: "1:242883286611:web:a61ea6d9d294c49b0618a6",
        measurementId: "G-VF8XVGCWM2"
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // API Configuration
      const API_BASE = 'https://burme-chat.onrender.com/api';
      // For local: const API_BASE = 'http://localhost:3000/api';

      // System Prompt for Burmese
      const SYSTEM_PROMPT = "You are Burme Chat, an AI assistant that communicates exclusively in Burmese (Myanmar language). Respond only in Burmese, be culturally sensitive, and help users with their questions in Burmese. Never respond in English.";

      // State
      let currentUser = null;
      let apiKey = localStorage.getItem('gemini_api_key') || '';
      let chatHistory = JSON.parse(localStorage.getItem('chat_history')) || [];
      let isDarkMode = localStorage.getItem('dark_mode') === 'true';

      // DOM Elements
      const welcomeScreen = document.getElementById('welcome-screen');
      const authScreen = document.getElementById('auth-screen');
      const chatScreen = document.getElementById('chat-screen');
      const chatContainer = document.getElementById('chat-container');
      const messageInput = document.getElementById('message-input');
      const sendBtn = document.getElementById('send-btn');
      const typingIndicator = document.getElementById('typing-indicator');
      const settingsModal = document.getElementById('settings-modal');
      const apiKeyInput = document.getElementById('api-key');
      const darkModeToggle = document.getElementById('dark-mode-toggle');
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const resetForm = document.getElementById('reset-form');
      const authTabs = document.querySelectorAll('.auth-tab');
      const authError = document.getElementById('auth-error');

      // Initialize
      function init() {
        if (apiKey) apiKeyInput.value = apiKey;
        if (isDarkMode) {
          document.body.classList.add('dark-mode');
          darkModeToggle.checked = true;
        }
        loadChatHistory();
        
        // Check auth state
        onAuthStateChanged(auth, (user) => {
          if (user) {
            currentUser = user;
            user.getIdToken().then(token => {
              localStorage.setItem('auth_token', token);
              checkApiKeyStatus(token);
            });
          } else {
            showAuthScreen();
          }
        });
      }

      // Check API Key status
      async function checkApiKeyStatus(token) {
        try {
          const res = await fetch(`${API_BASE}/auth/apikey`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const data = await res.json();
          if (!data.hasApiKey) {
            openSettings();
          }
        } catch (e) {
          console.error(e);
        }
      }

      // Show screens
      function showAuthScreen() {
        welcomeScreen.style.display = 'none';
        chatScreen.style.display = 'none';
        authScreen.style.display = 'flex';
      }

      function showChatScreen() {
        authScreen.style.display = 'none';
        welcomeScreen.style.display = 'none';
        chatScreen.style.display = 'flex';
        messageInput.focus();
      }

      // Auth tab switching
      authTabs.forEach(tab => {
        tab.addEventListener('click', () => {
          authTabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          
          loginForm.style.display = 'none';
          registerForm.style.display = 'none';
          resetForm.style.display = 'none';
          authError.style.display = 'none';
          
          document.getElementById(`${tab.dataset.form}-form`).style.display = 'block';
        });
      });

      // Login
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        
        try {
          authError.style.display = 'none';
          const userCred = await signInWithEmailAndPassword(auth, email, password);
          const token = await userCred.user.getIdToken();
          localStorage.setItem('auth_token', token);
          currentUser = userCred.user;
          showChatScreen();
        } catch (error) {
          authError.textContent = getAuthErrorMessage(error.code);
          authError.style.display = 'block';
        }
      });

      // Register
      registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('register-email').value;
        const password = document.getElementById('register-password').value;
        
        try {
          authError.style.display = 'none';
          const userCred = await createUserWithEmailAndPassword(auth, email, password);
          const token = await userCred.user.getIdToken();
          localStorage.setItem('auth_token', token);
          currentUser = userCred.user;
          showChatScreen();
          openSettings();
        } catch (error) {
          authError.textContent = getAuthErrorMessage(error.code);
          authError.style.display = 'block';
        }
      });

      // Password Reset
      resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('reset-email').value;
        
        try {
          authError.style.display = 'none';
          await sendPasswordResetEmail(auth, email);
          authError.textContent = 'ပါဆယ်လိုက်ပါရန်။ အီးမေးလ်စစ်ဆေးပါရန်။';
          authError.style.color = 'green';
          authError.style.display = 'block';
        } catch (error) {
          authError.textContent = getAuthErrorMessage(error.code);
          authError.style.display = 'block';
        }
      });

      function getAuthErrorMessage(code) {
        const messages = {
          'auth/email-already-in-use': 'ဤအီးမေးလ်သည် ရှိပြီးပါရန်။',
          'auth/invalid-email': 'အီးမေးလ်ပါးလို့မရပါရန်။',
          'auth/operation-not-allowed': 'ဤလုပ်ငန်းသည် မလုပ်သင့်ပါရန်။',
          'auth/weak-password': 'စကားဝှက်သည် အားနည်းပါရန်။',
          'auth/user-disabled': 'ဤအသုံးပါးလို့မရပါရန်။',
          'auth/user-not-found': 'ဤအီးမေးလ်သည် မရှိပါရန်။',
          'auth/wrong-password': 'စကားဝှက်မှားယွင်းပါရန်။',
          'auth/invalid-credential': 'အီးမေးလ်သို့စကားဝှက်မှားယွင်းပါရန်။',
          'auth/invalid-api-key': 'API Key မှားယွင်းပါရန်။',
          'auth/too-many-requests': 'အလွန်အကျွံကြိုးစားပါရန်။ နောက်တစ်ခါ ကြိုးစားပါရန်။'
        };
        return messages[code] || 'မှားယွင်းပါရန်။';
      }

      // Start Chat
      function startChat() {
        if (!apiKey) {
          openSettings();
          return;
        }
        welcomeScreen.style.display = 'none';
        showChatScreen();
      }

      // Load Chat History
      function loadChatHistory() {
        if (chatHistory.length === 0) {
          document.getElementById('empty-state').style.display = 'block';
          return;
        }
        document.getElementById('empty-state').style.display = 'none';
        
        chatHistory.forEach(msg => {
          addMessage(msg.text, msg.sender, msg.timestamp);
        });
      }

      // Add Message to UI
      function addMessage(text, sender, timestamp = null) {
        const time = timestamp || new Date().toLocaleTimeString('my-MM', { 
          hour: '2-digit', 
          minute: '2-digit' 
        });
        
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        messageDiv.innerHTML = `
          ${text}
          <span class="timestamp">${time}</span>
        `;
        
        chatContainer.appendChild(messageDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }

      // Handle Key Press
      function handleKeyPress(event) {
        if (event.key === 'Enter') sendMessage();
      }

      // Send Message
      async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        if (!currentUser) {
          showAuthScreen();
          return;
        }

        addMessage(text, 'user');
        chatHistory.push({ text, sender: 'user', timestamp: new Date().toLocaleTimeString('my-MM') });
        localStorage.setItem('chat_history', JSON.stringify(chatHistory));
        
        messageInput.value = '';
        sendBtn.disabled = true;

        typingIndicator.classList.add('active');
        chatContainer.appendChild(typingIndicator);
        chatContainer.scrollTop = chatContainer.scrollHeight;

        try {
          const token = await currentUser.getIdToken();
          const response = await fetch(`${API_BASE}/chat`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ message: text })
          });

          const data = await response.json();
          
          typingIndicator.classList.remove('active');
          
          if (!response.ok) {
            throw new Error(data.error || 'API Error');
          }
          
          addMessage(data.reply, 'ai');
          chatHistory.push({ text: data.reply, sender: 'ai', timestamp: new Date().toLocaleTimeString('my-MM') });
          localStorage.setItem('chat_history', JSON.stringify(chatHistory));
        } catch (error) {
          typingIndicator.classList.remove('active');
          showError("API အပါအဝင် မှားယွင်းပါရန်။ " + error.message);
        }

        sendBtn.disabled = false;
        messageInput.focus();
      }

      // Show Error
      function showError(message) {
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message';
        errorDiv.textContent = message;
        chatContainer.appendChild(errorDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        
        setTimeout(() => errorDiv.remove(), 5000);
      }

      // Open Settings
      function openSettings() {
        settingsModal.classList.add('active');
        apiKeyInput.value = apiKey;
      }

      // Close Settings
      function closeSettings() {
        settingsModal.classList.remove('active');
      }

      // Save Settings
      async function saveSettings() {
        apiKey = apiKeyInput.value.trim();
        
        if (!currentUser) {
          localStorage.setItem('gemini_api_key', apiKey);
          closeSettings();
          return;
        }

        try {
          const token = await currentUser.getIdToken();
          const res = await fetch(`${API_BASE}/auth/apikey`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ apiKey })
          });
          
          const data = await res.json();
          if (res.ok) {
            localStorage.setItem('gemini_api_key', apiKey);
            closeSettings();
          } else {
            alert(data.error || 'Error saving API key');
          }
        } catch (error) {
          console.error(error);
          localStorage.setItem('gemini_api_key', apiKey);
          closeSettings();
        }
      }

      // Toggle Theme
      function toggleTheme() {
        isDarkMode = !isDarkMode;
        document.body.classList.toggle('dark-mode', isDarkMode);
        localStorage.setItem('dark_mode', isDarkMode);
        darkModeToggle.checked = isDarkMode;
      }

      // Clear Chat
      function clearChat() {
        if (confirm('စကားပြောခန်းအားလုံးဖျက်မှာလားခင်ဗျာ။')) {
          chatHistory = [];
          localStorage.removeItem('chat_history');
          
          chatContainer.innerHTML = `
            <div class="empty-state" id="empty-state">
              <div class="empty-state-icon">💬</div>
              <p>မြန်မာလို စာရိုက်ပြောပါရန်...</p>
            </div>
          `;
        }
      }

      // Logout
      function logout() {
        signOut(auth).then(() => {
          currentUser = null;
          localStorage.removeItem('auth_token');
          chatHistory = [];
          localStorage.removeItem('chat_history');
          showAuthScreen();
        });
      }

      // Initialize on load
      init();
    </script>
</body>
</html>
